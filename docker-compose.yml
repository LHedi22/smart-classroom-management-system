services:

  # ── PostgreSQL 15 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: smartcam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartclassroom
      POSTGRES_USER: smartcam
      POSTGRES_PASSWORD: smartcam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcam -d smartclassroom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartcam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mosquitto MQTT Broker ─────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartcam-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

  # ── MariaDB (Moodle sidecar) — start with: docker compose --profile moodle up -d
  mariadb:
    image: mariadb:10.6
    container_name: smartcam-mariadb
    restart: unless-stopped
    profiles: [moodle]
    environment:
      MARIADB_ROOT_PASSWORD: moodlerootpass
      MARIADB_DATABASE: moodle
      MARIADB_USER: moodle
      MARIADB_PASSWORD: moodlepass
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "moodle", "-pmoodlepass"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Moodle 4.x (Bitnami) — start with: docker compose --profile moodle up -d
  moodle:
    image: bitnami/moodle:4
    container_name: smartcam-moodle
    restart: unless-stopped
    profiles: [moodle]
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MOODLE_DATABASE_TYPE: mariadb
      MOODLE_DATABASE_HOST: mariadb
      MOODLE_DATABASE_PORT_NUMBER: 3306
      MOODLE_DATABASE_NAME: moodle
      MOODLE_DATABASE_USER: moodle
      MOODLE_DATABASE_PASSWORD: moodlepass
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: admin123
      MOODLE_EMAIL: admin@smartcam.local
      MOODLE_SITE_NAME: "SMU Smart Classroom"
      BITNAMI_DEBUG: "false"
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata

  # ── Ollama (phi3:latest for AI summaries) ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: smartcam-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: smartcam-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://smartcam:smartcam@postgres:5432/smartclassroom
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MOODLE_URL: http://moodle:8080
      MOODLE_TOKEN: ""
      SECRET_KEY: changeme
      ROOM_ID: room1
      MOCK_MODE: "true"
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      REQUIRE_AUTH: "false"
      TEMP_AC_ON_THRESHOLD: "28"
      TEMP_AC_OFF_THRESHOLD: "22"
      AIR_QUALITY_ALERT_THRESHOLD: "500"
      FACE_RECOGNITION_THRESHOLD: "0.6"
      RECOGNITION_FPS: "2"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "phi3:latest"

  # ── React Frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: smartcam-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mariadb_data:
  moodle_data:
  moodledata_data:
  ollama_data:
